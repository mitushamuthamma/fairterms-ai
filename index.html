<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FairTerms AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
}

/* HEADER */
header {
  padding: 20px 60px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

header h1 {
  color: #6366f1;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 50px;
}

.hero h2 {
  font-size: 38px;
}

/* INPUT CARD */
.card {
  background: #020617;
  max-width: 750px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
  border: 1px solid #1e293b;
}

textarea {
  width: 100%;
  height: 150px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  background: linear-gradient(90deg,#6366f1,#8b5cf6);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
}

/* LOADING */
.loading {
  text-align: center;
  margin-top: 10px;
  display: none;
}

/* RESULTS */
.results {
  display: none;
  max-width: 1000px;
  margin: 40px auto;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 15px;
}

/* BOX */
.box {
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

.red { border-left: 5px solid #ef4444; }
.yellow { border-left: 5px solid #f59e0b; }
.green { border-left: 5px solid #22c55e; }

/* SCORE CIRCLE */
.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(#6366f1 0%, #1e293b 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.circle span {
  font-size: 24px;
  font-weight: bold;
}

/* BARS */
.bar {
  height: 10px;
  border-radius: 5px;
  margin: 5px 0;
}

.bar-red { background: #ef4444; }
.bar-yellow { background: #f59e0b; }
.bar-green { background: #22c55e; }

/* TRANSLATIONS */
.translation div {
  margin-bottom: 10px;
  padding: 10px;
  border: 1px solid #1e293b;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <h1>FairTerms AI</h1>
</header>

<section class="hero">
  <h2>Know what you're signing</h2>
</section>

<div class="card">
  <textarea id="inputText" placeholder="Paste Terms..."></textarea>
  <button onclick="analyze()">Analyze</button>
  <div class="loading" id="loading">⚡ Analyzing...</div>
</div>

<div class="results" id="results">

  <div class="grid">

    <!-- SCORE -->
    <div class="box">
      <h3>Score</h3>
      <div class="circle" id="circle">
        <span id="score">0</span>
      </div>
    </div>

    <!-- RED -->
    <div class="box red">
      <h3>🚨 Red Flags</h3>
      <ul id="redFlags"></ul>
    </div>

    <!-- YELLOW -->
    <div class="box yellow">
      <h3>⚠️ Yellow Flags</h3>
      <ul id="yellowFlags"></ul>
    </div>

  </div>

  <!-- GREEN FLAGS -->
  <div class="box green" style="margin-top:20px;">
    <h3>✅ Green Flags</h3>
    <ul id="greenFlags"></ul>
  </div>

  <!-- BARS -->
  <div class="box" style="margin-top:20px;">
    <h3>Risk Breakdown</h3>
    <div>Red Risk</div>
    <div class="bar bar-red" id="barRed"></div>
    <div>Yellow Risk</div>
    <div class="bar bar-yellow" id="barYellow"></div>
    <div>Safe</div>
    <div class="bar bar-green" id="barGreen"></div>
  </div>

  <!-- VERDICT -->
  <div class="box" style="margin-top:20px;">
    <h3>Verdict</h3>
    <p id="verdict"></p>
  </div>

  <!-- TRANSLATIONS -->
  <div class="box translation" style="margin-top:20px;">
    <h3>Simplified</h3>
    <div id="translations"></div>
  </div>

</div>

<script>
async function analyze() {
  const text = document.getElementById("inputText").value;

  if (!text.trim()) {
    alert("Paste something");
    return;
  }

  document.getElementById("loading").style.display = "block";

  try {
    const res = await fetch("http://localhost:3000/api/analyze", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    // SCORE ANIMATION
    let score = data.fairness_score;
    document.getElementById("score").innerText = score;

    document.getElementById("circle").style.background =
      `conic-gradient(#6366f1 ${score}%, #1e293b ${score}%)`;

    // FLAGS
    document.getElementById("redFlags").innerHTML =
      data.red_flags.map(x => `<li>${x}</li>`).join("");

    document.getElementById("yellowFlags").innerHTML =
      data.yellow_flags.map(x => `<li>${x}</li>`).join("");

    // GREEN FLAGS (fallback if none)
    document.getElementById("greenFlags").innerHTML =
      data.green_flags
        ? data.green_flags.map(x => `<li>${x}</li>`).join("")
        : "<li>No strong positive clauses identified</li>";

    // BARS
    document.getElementById("barRed").style.width = (data.red_flags.length * 10) + "%";
    document.getElementById("barYellow").style.width = (data.yellow_flags.length * 10) + "%";
    document.getElementById("barGreen").style.width = score + "%";

    // VERDICT
    document.getElementById("verdict").innerText = data.verdict;

    // TRANSLATIONS
    document.getElementById("translations").innerHTML =
      data.translations.map(t => `
        <div>
          <b>Original:</b> ${t.original_clause}<br>
          <b>Simple:</b> ${t.simplified}
        </div>
      `).join("");

    document.getElementById("loading").style.display = "none";
    document.getElementById("results").style.display = "block";

  } catch (err) {
    alert("Backend error");
    document.getElementById("loading").style.display = "none";
  }
}
</script>

</body>
</html>
